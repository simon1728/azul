name: Release Daemon

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - .github/workflows/release-daemon.yml
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-daemon-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build daemon
        run: npm run build

      - name: Read package metadata
        id: meta
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Check whether this version already exists on npm
        id: npm
        shell: bash
        run: |
          if npm view "${{ steps.meta.outputs.name }}@${{ steps.meta.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Require version bump for daemon changes
        if: steps.npm.outputs.exists == 'true'
        shell: bash
        run: |
          echo "Version ${{ steps.meta.outputs.version }} is already published on npm."
          echo "Daemon files changed, so bump package.json version before merging to main."
          exit 1

      - name: Publish to npm
        shell: bash
        env:
          NODE_AUTH_TOKEN: ""
          NPM_TOKEN: ""
        run: |
          set -euo pipefail
          unset NODE_AUTH_TOKEN || true
          unset NPM_TOKEN || true
          rm -f .npmrc ~/.npmrc
          npm publish --provenance --access public

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="v${{ steps.meta.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
            exit 0
          fi

          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "Azul Daemon $TAG" \
            --generate-notes
